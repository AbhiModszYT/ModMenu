<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AbhiModszYT Mods Hub</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow-x:hidden;
}

#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:1s;
}
#loader img{
    width:230px;
    border-radius:12px;
    box-shadow:0 0 35px #00eaff;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
    padding-bottom:130px;
}

h1{
    text-align:center;
    text-shadow:0 0 20px #00eaff;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    padding:10px 20px;
    background:black;
    color:#00eaff;
    border:1px solid #00eaff;
    cursor:pointer;
}

.card{
    background:rgba(0,0,0,.85);
    border:1px solid #00eaff;
    border-radius:12px;
    margin-top:15px;
    box-shadow:0 0 15px #00eaff;
}

.card-header{
    padding:15px;
    cursor:pointer;
    font-weight:bold;
}

.card-body{
    display:none;
    padding:15px;
}

.card-body img{
    width:100%;
    max-width:220px;
    max-height:120px;
    object-fit:cover;
    border-radius:10px;
    margin:auto;
    display:block;
    border:1px solid #00eaff;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:black;
    color:#00eaff;
    border:1px solid #00eaff;
    cursor:pointer;
}

.social-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
    flex-wrap:wrap;
}

.rgb-btn{
    padding:14px 28px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg, red, blue, lime, cyan, magenta);
    background-size:400%;
    animation:rgb 10s linear infinite;
}

@keyframes rgb{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
</style>
</head>

<body>

<div id="loader">
<img src="https://raw.githubusercontent.com/AbhiModszYT/AbhiModszYT/main/Gojo.gif">
<h2>Loading...</h2>
</div>

<div class="container">
<h1>AbhiModszYT Mods Hub</h1>

<div class="tabs">
<button class="tab-btn" onclick="openTab('apk')">APK</button>
<button class="tab-btn" onclick="openTab('lua')">LUA</button>
</div>

<!-- APK TAB -->
<div id="apk" class="tab-content active">

<div class="card">
<div class="card-header" onclick="toggleCard(this)">🚀 War Robots</div>
<div class="card-body">
<img src="https://raw.githubusercontent.com/AbhiModszYT/AbhiModszYT/main/WarRoboticon.png">

<pre>
🎮 Game Name : War Robots
📦 Package : com.pixonic.wwr
🔥 MOD FEATURES AVAILABLE
</pre>

<button onclick="getKey()">🔑 Get Key</button>
</div>
</div>

<div class="card">
<div class="card-header" onclick="toggleCard(this)">🚀 Mech Arena</div>
<div class="card-body">
<img src="https://raw.githubusercontent.com/AbhiModszYT/AbhiModszYT/main/mecharena.png">

<pre>
🎮 Game Name: Mech Arena
📦 Package: com.plarium.mechlegion
🔥 MOD FEATURES AVAILABLE
</pre>

<button onclick="getKey()">🔑 Get Key</button>
</div>
</div>

</div>

<!-- LUA TAB -->
<div id="lua" class="tab-content">
<div class="card">
<div class="card-header" onclick="toggleCard(this)">🚀 LUA Script</div>
<div class="card-body">
<img src="https://raw.githubusercontent.com/AbhiModszYT/AbhiModszYT/main/mecharena.png">

<pre>
➤ LUA Script Available
➤ Load via supported injector
</pre>

<button onclick="getKey()">🔑 Get Key</button>
</div>
</div>
</div>

<!-- ONLY YOUTUBE -->
<div class="social-buttons">
<button class="rgb-btn" onclick="openSocial('https://youtube.com/@abhimods')">
▶ YouTube
</button>
</div>

</div>

<script>
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.opacity="0";
setTimeout(()=>document.getElementById("loader").style.display="none",1000);
},2500);
});

function openTab(tab){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(tab).classList.add('active');
}

function toggleCard(el){
const body=el.nextElementSibling;
body.style.display = body.style.display==="block"?"none":"block";
}

function getKey(){
alert("🔑 Key System Coming Soon!");
}

function openSocial(link){
window.open(link,'https://t.me/+j0xujYtojAQzYmNl');
}
</script>

</body>
</html>
