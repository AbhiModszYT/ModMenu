<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AbhiModszYT Mods</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    user-select:none;
    -webkit-user-select:none;
}

#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#loader img{
    width:230px;
    border-radius:12px;
    box-shadow:0 0 35px #00eaff;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    text-shadow:0 0 20px #00eaff;
}

.card{
    background:rgba(0,0,0,.85);
    border:1px solid #00eaff;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0 0 15px #00eaff;
}

.card-header{
    padding:15px;
    font-weight:bold;
}

.card-body{
    display:block;
    padding:15px;
}

.card-body img{
    width:100%;
    max-width:220px;
    border-radius:10px;
    margin:auto;
    display:block;
    border:1px solid #00eaff;
}

.social-buttons{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:30px;
}

.rgb-btn{
    padding:14px 28px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg, red, blue, lime, cyan, magenta);
    background-size:400%;
    animation:rgb 10s linear infinite;
}

@keyframes rgb{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
</style>
</head>

<body>

<audio id="clickSound" src="https://raw.githubusercontent.com/AbhiModszYT/AbhiModszYT/main/gojo.mp3"></audio>

<div id="loader">
<img src="https://raw.githubusercontent.com/AbhiModszYT/AbhiModszYT/main/Gojo.gif">
<h2>Loading...</h2>
</div>

<div class="container">
<h1>AbhiModszYT Mods</h1>

<div class="card">
<div class="card-header">🚀 War Robots</div>
<div class="card-body">
<img src="https://raw.githubusercontent.com/AbhiModszYT/AbhiModszYT/main/WarRoboticon.png">

<pre>
🎮 Game Name : War Robots
📦 Package : com.pixonic.wwr
🔥 MOD FEATURES AVAILABLE
</pre>
</div>
</div>

<!-- BUTTONS -->
<div class="social-buttons">

<button class="rgb-btn" onclick="openSocial('https://youtube.com/@abhimods')">
▶ YouTube
</button>

<button class="rgb-btn" onclick="openSocial('https://t.me/+j0xujYtojAQzYmNl')">
✈ Teleport
</button>

<button class="rgb-btn" onclick="getKey()">
🔑 Get Key
</button>

<button class="rgb-btn" onclick="openSocial('https://youtu.be/VTqDCLZasZQ?si=1Wxt6M9kSz7KkfLn')">
▶ How to Get Key
</button>

</div>

</div>

<script>
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);
});

// 🔊 Sound
function playSound(){
let s=document.getElementById("clickSound");
s.currentTime=0;
s.play();
}

// 🔑 Key
function getKey(){
playSound();
window.open("https://t.me/+j0xujYtojAQzYmNl","_blank");
}

// 🌐 Open links
function openSocial(link){
playSound();
window.open(link,"_blank");
}

/* 🚫 ANTI COPY BASIC */
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e){
if(
    (e.ctrlKey && ["u","U","s","S","c","C"].includes(e.key))
){
    e.preventDefault();
    alert("⚠️ Action blocked!");
}
});

document.addEventListener("copy", function(e){
e.preventDefault();
alert("⚠️ Copying is disabled!");
});
</script>

</body>
</html>
